<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow | Academic OS</title>

<style>
:root {
    --glass: rgba(15, 23, 42, 0.75);
    --accent: #818cf8;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
}

* { 
    margin: 0; padding: 0; box-sizing: border-box; 
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    outline: none !important;
}

body {
    background: url('Background.jpg') no-repeat center center fixed;
    background-color: #0f172a; 
    background-size: cover;
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.app-container {
    width: 92%;
    max-width: 1100px;
    height: 85vh;
    background: var(--glass);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    padding: 2rem 3rem;
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
    position: relative;
}

.stats-bar {
    position: absolute;
    top: 2rem;
    right: 3rem;
    text-align: right;
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 1px;
}
.stats-bar b { color: var(--accent); margin-left: 10px; font-weight: 800; }

header {
    display: flex;
    align-items: center;
    margin-bottom: 2rem;
}

.toggle-container {
    display: flex;
    background: rgba(0,0,0,0.3);
    padding: 4px;
    border-radius: 14px;
    margin-left: 20px;
}

.toggle-btn {
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
}

.toggle-btn.active { background: var(--accent); color: white; }

.view { display: none; flex-direction: column; height: 100%; width: 100%; }
.view.active { display: flex; }

#search-form { display: flex; gap: 12px; margin-bottom: 1.5rem; width: 100%; }

input {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px 20px;
    border-radius: 12px;
    color: white;
    flex: 1;
}

.video-wrapper {
    flex: 1;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    background: transparent; 
    position: relative;
}

iframe {
    width: 100%; height: 100%; border: none;
    position: absolute; top: 0; left: 0;
    background: transparent;
}

#results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    padding: 20px;
    height: 100%;
    overflow-y: auto;
    background: rgba(0,0,0,0.4);
    position: absolute;
    top: 0; left: 0; width: 100%;
    z-index: 5;
}

.result-item {
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
}

.result-item:hover {
    background: rgba(255,255,255,0.08);
    border-color: var(--accent);
    transform: translateY(-4px);
}

.result-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.result-item p { 
    padding: 12px; font-size: 0.85rem; color: var(--text-main); font-weight: 500;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.pomodoro-container {
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
}

#timer {
    font-size: 11rem;
    font-weight: 700;
    margin: -1.5rem 0;
    color: var(--text-main);
    font-variant-numeric: tabular-nums;
    letter-spacing: -5px;
}

.timer-controls { display: flex; justify-content: center; gap: 15px; margin-top: 1.5rem; }

.btn-main {
    padding: 12px 30px;
    border-radius: 50px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s ease;
}

.settings-icon {
    position: absolute; bottom: 0; right: 0;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.5rem; cursor: pointer; transition: 0.3s;
}
.settings-icon:hover { color: var(--accent); transform: rotate(45deg); }

.settings-panel {
    display: none; position: absolute; bottom: 50px; right: 0;
    background: rgba(15, 23, 42, 0.98); padding: 25px;
    border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
    width: 280px; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.setting-item { margin-bottom: 15px; text-align: left; }
.setting-item label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
.setting-item input { width: 100%; margin-top: 8px; text-align: center; background: rgba(255,255,255,0.05); }

</style>
</head>

<body>

<div class="app-container">
    <div class="stats-bar">
        STUDY TIME <b id="total-time">00:00</b> 
        XP <b id="total-xp">0</b>
    </div>

    <header>
        <h2 style="font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent);">FLOW</h2>
        <div class="toggle-container">
            <button class="toggle-btn active" id="btn-yt" onclick="switchMode('yt')">Learning</button>
            <button class="toggle-btn" id="btn-study" onclick="switchMode('study')">Self-Study</button>
        </div>
    </header>

    <div id="yt-view" class="view active">
        <form id="search-form">
            <input type="text" id="search-input" placeholder="What do you need to master today?">
            <button type="submit" class="btn-main">Search</button>
        </form>
        <div class="video-wrapper">
            <div id="results-grid" style="display: none;"></div>
            <div id="yt-player-container"></div>
        </div>
    </div>

    <div id="study-view" class="view">
        <div class="pomodoro-container">
            <div id="status-label" style="font-size: 0.8rem; letter-spacing: 4px; color: var(--accent); font-weight: 800;">FOCUS</div>
            <div id="timer">25:00</div>

            <div class="timer-controls">
                <button class="btn-main" onclick="toggleTimer()" id="start-btn">Start</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.05);" onclick="resetTimer()">Reset</button>
            </div>

            <button class="settings-icon" onclick="toggleSettings()">⚙️</button>

            <div class="settings-panel" id="pomo-settings">
                <div class="setting-item">
                    <label>Focus Duration (min)</label>
                    <input type="number" id="focus-time" value="25" onchange="syncTimer()">
                </div>
                <div class="setting-item">
                    <label>Break Duration (min)</label>
                    <input type="number" id="break-time" value="5">
                </div>
                <button class="btn-main" style="width: 100%;" onclick="toggleSettings()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
const resumeSound = new Audio('applepay.mp3');
const pauseSound = new Audio('faaah.mp3');
const breakEndSound = new Audio('applepay.mp3');

const API_KEY = 'AIzaSyDoQ3sQk6xxHC8HuNB_xsyTM8hwR71f-WY';
let currentMode = 'yt';
let studySeconds = 0;
let xp = 0;

function updateStats() {
    const mins = Math.floor(studySeconds / 60);
    const secs = studySeconds % 60;
    document.getElementById('total-time').innerText =
        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    xp = Math.floor(studySeconds / 10);
    document.getElementById('total-xp').innerText = xp;
}

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));

    if(mode === 'yt') {
        document.getElementById('yt-view').classList.add('active');
        document.getElementById('btn-yt').classList.add('active');
    } else {
        document.getElementById('study-view').classList.add('active');
        document.getElementById('btn-study').classList.add('active');
    }
}

/* ---------- YT SEARCH (restored) ---------- */
document.getElementById('search-form').onsubmit = async (e) => {
    e.preventDefault();
    const resultsGrid = document.getElementById('results-grid');
    resultsGrid.innerHTML = '';
    resultsGrid.style.display = 'grid';

    const rawQuery = document.getElementById('search-input').value || '';
    // Keep strict education filter as before
    const query = `${rawQuery} -vlog -shorts -meme -funny -entertainment -gaming -music`;

    try {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=8&q=${encodeURIComponent(query)}&type=video&videoCategoryId=27&relevanceLanguage=en&key=${"AIzaSyDoQ3sQk6xxHC8HuNB_xsyTM8hwR71f-WY"}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data && data.items && data.items.length) {
            data.items.forEach(item => {
                const vidId = item.id && (item.id.videoId || item.id);
                const thumb = (item.snippet && item.snippet.thumbnails && (item.snippet.thumbnails.medium || item.snippet.thumbnails.default)) ? (item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url) : '';
                const title = item.snippet && item.snippet.title ? item.snippet.title : 'Untitled';
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <img src="${thumb}">
                    <p>${title}</p>
                `;
                div.onclick = () => selectVideo(vidId);
                resultsGrid.appendChild(div);
            });
        } else {
            resultsGrid.innerHTML = '<p style="color:var(--text-dim); padding:12px;">No results found.</p>';
        }
    } catch (err) {
        console.error("Search failed.", err);
        const resultsGrid = document.getElementById('results-grid');
        resultsGrid.innerHTML = '<p style="color:var(--text-dim); padding:12px;">Search failed. Check console for details.</p>';
    }
};

function selectVideo(videoId) {
    if (!videoId) return;
    document.getElementById('results-grid').style.display = 'none';
    // embed player
    document.getElementById('yt-player-container').innerHTML =
        `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
}

/* ---------- GLOBAL STUDY TRACKER (FIXED) ---------- */
let isRunning = false;
let isBreak = false;

setInterval(() => {
    if (
        currentMode === 'yt' ||
        (currentMode === 'study' && isRunning && !isBreak)
    ) {
        studySeconds++;
        updateStats();
    }
}, 1000);

/* ---------- POMODORO ---------- */
let timerInterval;
let timeLeft = 25 * 60;

function toggleSettings() {
    const panel = document.getElementById('pomo-settings');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function syncTimer() {
    if (!isRunning) {
        timeLeft = document.getElementById('focus-time').value * 60;
        updateTimerDisplay();
    }
}

function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timer').innerText =
        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function toggleTimer() {
    if(isRunning) {
        clearInterval(timerInterval);
        pauseSound.play();
        document.getElementById('start-btn').innerText = 'Start';
        isRunning = false;
        return;
    }

    resumeSound.play();
    isRunning = true;
    document.getElementById('start-btn').innerText = 'Pause';

    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if(timeLeft <= 0) {
            clearInterval(timerInterval);

            if(!isBreak) {
                // Focus → auto start break
                isBreak = true;
                document.getElementById('status-label').innerText = 'BREAK';
                timeLeft = document.getElementById('break-time').value * 60;
                toggleTimer();
            } else {
                // Break finished
                breakEndSound.play();
                isBreak = false;
                isRunning = false;
                document.getElementById('status-label').innerText = 'FOCUS';
                timeLeft = document.getElementById('focus-time').value * 60;
                updateTimerDisplay();
                document.getElementById('start-btn').innerText = 'Start';
            }
        }
    }, 1000);
}

function resetTimer() {
    clearInterval(timerInterval);
    isRunning = false;
    isBreak = false;
    document.getElementById('status-label').innerText = 'FOCUS';
    timeLeft = document.getElementById('focus-time').value * 60;
    updateTimerDisplay();
    document.getElementById('start-btn').innerText = 'Start';
}
</script>

</body>
</html>
